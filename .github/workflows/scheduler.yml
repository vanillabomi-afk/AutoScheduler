name: Discord Scheduler

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scheduler:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run scheduler
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          python scheduler.py

      - name: Commit updates
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add schedule.csv

          git diff --staged --quiet || git commit -m "Update schedule status"

          git push
